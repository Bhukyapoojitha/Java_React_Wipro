server.port=8080
spring.application.name=API-GATEWAY

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webmvc.enabled=true
# Route 1 - Account Service
spring.cloud.gateway.server.webmvc.routes[0].id=account-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/accounts/**
#spring.cloud.gateway.server.webmvc.routes[0].filters[0]=CircuitBreaker=accountCB

# Route 2 - Transaction Service
spring.cloud.gateway.server.webmvc.routes[1].id=transaction-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/transactions/**
#spring.cloud.gateway.server.webmvc.routes[1].filters[0]=CircuitBreaker=transactionCB


# Route 3 - Account API Docs
spring.cloud.gateway.server.webmvc.routes[2].id=account-service-docs
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/account/v3/api-docs
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=SetPath=/v3/api-docs

# Route 4 - Transaction API Docs
spring.cloud.gateway.server.webmvc.routes[3].id=transaction-service-docs
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/transaction/v3/api-docs
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=SetPath=/v3/api-docs


# Swagger Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.urls[0].name=account-service
springdoc.swagger-ui.urls[0].url=/account/v3/api-docs
springdoc.swagger-ui.urls[1].name=transaction-service
springdoc.swagger-ui.urls[1].url=/transaction/v3/api-docs